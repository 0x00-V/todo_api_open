<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#121212;
    color:#f2f2f2;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.register-container{
    background:#1e1e1e;
    padding:40px 30px;
    border-radius:14px;
    width:90%;
    max-width:400px;
    border:1px solid #2a2a2a;
    box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

.register-container h1{
    text-align:center;
    margin-bottom:24px;
    font-size:24px;
    color:#ff3b3b;
}

.registration-form{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.form-container{
    display:flex;
    flex-direction:column;
    gap:6px;
}

label{
    font-size:14px;
    color:#ccc;
}

input[type="text"], input[type="password"]{
    padding:10px;
    border-radius:8px;
    border:1px solid #333;
    background:#121212;
    color:white;
}

input[type="text"]:focus, input[type="password"]:focus{
    outline:none;
    border-color:#ff3b3b;
}

button{
    background:#ff3b3b;
    border:none;
    padding:12px;
    border-radius:8px;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#ff5555;
}

p{
    margin-top:12px;
    text-align:center;
    color:#aaa;
    font-size:14px;
}

p a{
    color:#ff3b3b;
    text-decoration:none;
}

p a:hover{
    text-decoration:underline;
}

</style>
</head>
<body>

<div class="register-container">
<h1 style="color: white;">Create Account</h1>
<form class="registration-form">
    <div class="form-container">
        <label for="username">Username</label>
        <input type="text" id="username" name="Username" required>
    </div>
    <div class="form-container">
        <label for="email">Email</label>
        <input type="text" id="email" placeholder="example@example.com" name="EmailAddress" autocomplete="email" required>
    </div>
    <div class="form-container">
        <label for="password">Password</label>
        <input type="password" id="password" name="Password" required>
    </div>
    <div class="form-container">
        <button type="submit">Register</button>
    </div>
</form>
<p>Already have an account? <a href="/login.html">Login</a></p>
</div>

<script>
// Redirect if already logged in
async function checkIfLoggedIn(){
    try{
        const response = await fetch('http://127.0.0.1:8000/me', {method: 'GET', credentials: 'include'});
        if (response.ok){
            window.location.href = "/index.html";
        }
    }catch{}
}

const form = document.querySelector('.registration-form');
form.addEventListener('submit', async (event) => {
    event.preventDefault();
    const formData = new FormData(form);
    const jsonifiedData = Object.fromEntries(formData.entries());
    try{
        const response = await fetch('http://127.0.0.1:8000/register', {
            method: 'POST',
            credentials: 'include',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(jsonifiedData)
        });
        const result = await response.json();
        if(!response.ok){
            alert(`Error: ${result.detail.Response}`);
            return;
        }
        alert("Account created successfully.");
        window.location.href='/login.html';
    } catch(error){
        alert("ERR_CONNECTION_REFUSED\nThis service may be down.");
    }
});

window.addEventListener("load", async () => {
    await checkIfLoggedIn();
});
</script>

</body>
</html>
